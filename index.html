<style>
:root{--primary:#059669;--primary-light:#10b981;--primary-dark:#047857;--accent:#f59e0b;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--dark:#064e3b;--darker:#022c22;--surface:#065f46;--surface-light:#047857;--text:#ecfdf5;--text-muted:#a7f3d0;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--darker)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--darker);color:var(--text);overflow:hidden;height:100%;position:fixed;inset:0;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased}
#app{height:100%;display:flex;flex-direction:column;position:relative}

/* Install Banner */
.install-banner{position:fixed;top:var(--safe-top);left:0;right:0;background:linear-gradient(135deg,var(--primary),var(--primary-light));padding:12px 16px;display:none;align-items:center;justify-content:space-between;z-index:1000;animation:slideDown .3s ease}
.install-banner.show{display:flex}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.install-btn{padding:8px 16px;border-radius:8px;border:none;background:white;color:var(--primary);font-weight:700;font-size:.85rem;cursor:pointer}

/* Header */
.header{padding:calc(12px + var(--safe-top)) 16px 12px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;justify-content:space-between;align-items:center;z-index:100;flex-shrink:0}
.header h1{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.header-icon{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center}
.status-badge{padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);display:flex;align-items:center;gap:6px}
.status-badge.active{background:rgba(16,185,129,.3);color:#6ee7b7}
.status-badge.scanning{background:rgba(245,158,11,.3);color:#fcd34d}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* Camera Section */
.camera-section{flex:1;display:flex;flex-direction:column;position:relative;min-height:0;background:#000}
.video-wrapper{position:relative;flex:1;overflow:hidden;background:#000}
#videoElement{width:100%;height:100%;object-fit:cover;display:block}
#canvasOverlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* Crop Frame */
.crop-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:75%;aspect-ratio:1;border:3px solid rgba(5,150,105,.5);border-radius:24px;pointer-events:none;box-shadow:0 0 30px rgba(5,150,105,.2)}
.crop-frame::before,.crop-frame::after{content:'';position:absolute;width:30px;height:30px;border-color:var(--primary);border-style:solid}
.crop-frame::before{top:-3px;left:-3px;border-width:4px 0 0 4px;border-radius:24px 0 0 0}
.crop-frame::after{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-radius:0 0 24px 0}
.crop-guide{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:.8rem;text-align:center;background:rgba(0,0,0,.5);padding:8px 16px;border-radius:20px;white-space:nowrap}

/* Scan Button */
.scan-controls{padding:16px 20px calc(16px + var(--safe-bottom));background:var(--dark);display:flex;flex-direction:column;gap:12px;align-items:center;flex-shrink:0}
.scan-btn{width:72px;height:72px;border-radius:50%;border:4px solid var(--primary);background:var(--primary);color:white;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(5,150,105,.4);transition:all .2s;touch-action:manipulation;position:relative}
.scan-btn:active{transform:scale(.92);box-shadow:0 2px 10px rgba(5,150,105,.3)}
.scan-btn::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(5,150,105,.3);animation:ripple 2s infinite}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(1.3);opacity:0}}
.scan-label{font-size:.75rem;color:var(--text-muted);margin-top:4px}

/* Camera Controls */
.camera-controls{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:8px;z-index:50}
.cam-btn{width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.cam-btn.active{background:var(--primary)}

/* Results Panel */
.results-panel{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-radius:24px 24px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:200;max-height:75vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.5)}
.results-panel.open{transform:translateY(0)}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:sticky;top:0;background:var(--dark);padding-bottom:8px}
.panel-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.close-panel{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Crop Result Card */
.crop-result{background:linear-gradient(135deg,var(--surface),var(--surface-light));border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid rgba(5,150,105,.2);animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.crop-identified{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.crop-icon{width:48px;height:48px;border-radius:12px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.crop-name{flex:1}
.crop-name h3{font-size:1.1rem;font-weight:700}
.crop-name p{font-size:.8rem;color:var(--text-muted);margin-top:2px}
.crop-confidence{display:inline-block;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:700;background:rgba(16,185,129,.2);color:var(--success)}

/* Price Card */
.price-card{background:var(--darker);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid rgba(245,158,11,.2)}
.price-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.price-label{font-size:.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.price-value{font-size:1.5rem;font-weight:800;color:var(--accent)}
.price-unit{font-size:.85rem;color:var(--text-muted)}
.price-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.price-detail{background:rgba(0,0,0,.2);padding:10px;border-radius:8px;text-align:center}
.price-detail-label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.price-detail-value{font-size:.9rem;font-weight:700}
.price-trend{display:flex;align-items:center;gap:6px;margin-top:10px;padding:8px;border-radius:8px;background:rgba(0,0,0,.2)}
.price-trend.up{color:var(--danger)}
.price-trend.down{color:var(--success)}
.price-trend.stable{color:var(--text-muted)}
.market-info{font-size:.75rem;color:var(--text-muted);margin-top:8px;text-align:center}

/* Action Buttons */
.action-row{display:flex;gap:8px;margin-top:12px}
.action-btn{flex:1;padding:12px;border-radius:10px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation}
.action-btn.primary{background:var(--primary);color:white}
.action-btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--surface-light)}
.action-btn:active{transform:scale(.96)}

/* Price List Panel */
.price-list-panel{position:fixed;inset:0;background:var(--darker);z-index:300;display:none;flex-direction:column}
.price-list-panel.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.price-list-header{padding:calc(16px + var(--safe-top)) 16px 16px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.price-list-header h2{font-size:1.1rem;font-weight:700}
.price-list-content{flex:1;overflow-y:auto;padding:16px}
.market-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.market-tabs::-webkit-scrollbar{display:none}
.market-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--surface-light);background:transparent;color:var(--text-muted);font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
.market-tab.active{background:var(--primary);border-color:var(--primary);color:white}
.crop-price-card{background:var(--surface);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(5,150,105,.1)}
.crop-price-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.crop-price-name{font-weight:700;font-size:.95rem}
.crop-price-local{font-size:.75rem;color:var(--text-muted)}
.crop-price-amount{font-size:1.3rem;font-weight:800;color:var(--accent)}
.crop-price-range{font-size:.75rem;color:var(--text-muted);margin-top:2px}

/* Toast */
.toast-container{position:fixed;top:calc(60px + var(--safe-top));left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:90%;max-width:360px}
.toast{padding:10px 16px;border-radius:12px;background:var(--surface);color:var(--text);font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .25s ease;border:1px solid var(--surface-light);pointer-events:all}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(6,78,59,.95);backdrop-filter:blur(10px);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-overlay.active{display:flex}
.spinner{width:48px;height:48px;border:3px solid var(--surface-light);border-top-color:var(--primary-light);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-weight:600;color:var(--text-muted);font-size:.9rem}

/* Flash */
.flash{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:250;transition:opacity .08s}
.flash.active{opacity:.25}

/* Empty State */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state i{font-size:3rem;margin-bottom:16px;opacity:.5}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--dark);border-top:1px solid var(--surface-light);padding:calc(8px + var(--safe-bottom)) 16px 8px;display:flex;justify-content:space-around;align-items:center;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border:none;background:transparent;color:var(--text-muted);font-size:.65rem;font-weight:600;cursor:pointer;touch-action:manipulation}
.nav-btn i{font-size:1.2rem}
.nav-btn.active{color:var(--primary-light)}

@media(min-width:600px){#app{max-width:430px;margin:0 auto;border-left:1px solid var(--surface-light);border-right:1px solid var(--surface-light)}}
</style>

  { key: 'cassava', names: ['cassava','kamoteng kahoy','kamotengkahoy','manioc','yuca','white tuber','beige tuber'], color: {r:[200,255],g:[200,255],b:[180,240]}, icon: '🥔', desc: 'White/beige flesh, cylindrical' },
  { key: 'gabi', names: ['taro','gabi','coco yam','dasheen','brown tuber'], color: {r:[120,180],g:[80,140],b:[40,100]}, icon: '🌿', desc: 'Brown skin, round shape' },
  { key: 'ube', names: ['purple yam','ube','ubi','violet tuber','purple sweet potato'], color: {r:[100,180],g:[50,120],b:[120,200]}, icon: '🍠', desc: 'Purple/violet flesh' },
  { key: 'linsa', names: ['cocoyam','linsa','gabi gabi','small taro'], color: {r:[180,240],g:[160,220],b:[140,200]}, icon: '🌱', desc: 'Small, white/light brown' },
  { key: 'palawan', names: ['swamp taro','palawan','giant taro','large corm'], color: {r:[160,220],g:[140,200],b:[100,180]}, icon: '🌴', desc: 'Large corm, white flesh' }
];

// Install prompt

if(!deferredPrompt)return;
deferredPrompt.prompt();
var r=await deferredPrompt.userChoice;
if(r.outcome==='accepted')installBanner.classList.remove('show');
deferredPrompt=null;
});

e.preventDefault();deferredPrompt=e;
if(!window.matchMedia('(display-mode: standalone)').matches){

}

// State

const canvas=document.getElementById('canvasOverlay');
const ctx=canvas.getContext('2d');
const scanBtn=document.getElementById('scanBtn');
const resultsPanel=document.getElementById('resultsPanel');
const resultsContent=document.getElementById('resultsContent');
const priceListPanel=document.getElementById('priceListPanel');
const loadingOverlay=document.getElementById('loadingOverlay');
const statusBadge=document.getElementById('statusBadge');
const statusText=document.getElementById('statusText');

// Audio
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur){try{var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=freq;g.gain.setValueAtTime(.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);o.start();o.stop(audioCtx.currentTime+dur)}catch(e){}}
function successSound(){beep(880,.1);setTimeout(function(){beep(1100,.15)},120)}
function errorSound(){beep(300,.3)}

// Toast
function showToast(msg,type){
type=type||'info';
var container=document.getElementById('toastContainer');
var toast=document.createElement('div');
toast.className='toast '+(type==='success'?'success':type==='error'?'error':'');
toast.innerHTML='<i class="fas fa-'+(type==='success'?'check-circle':type==='error'?'exclamation-circle':'info-circle')+'"></i> '+msg;
container.appendChild(toast);
setTimeout(function(){toast.remove()},3000);
}

// Camera
async function initCamera(){
loadingOverlay.classList.add('active');
try{
if(state.stream){state.stream.getTracks().forEach(function(t){t.stop()})}
var constraints={video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false};
state.stream=await navigator.mediaDevices.getUserMedia(constraints);
state.track=state.stream.getVideoTracks()[0];
video.srcObject=state.stream;
await new Promise(function(resolve){video.onloadedmetadata=function(){video.play();resolve()}});
canvas.width=video.videoWidth;canvas.height=video.videoHeight;
updateStatus('active','Ready to Scan');
loadingOverlay.classList.remove('active');
showToast('Camera ready - point at root crop','success');
}catch(err){
loadingOverlay.classList.remove('active');
updateStatus('scanning','Camera Error');
showToast('Camera access denied','error');
}
}

// Torch
document.getElementById('torchBtn').addEventListener('click',async function(){
if(!state.track)return;
try{
var caps=state.track.getCapabilities();
if(caps.torch){
var on=!this.classList.contains('active');
await state.track.applyConstraints({advanced:[{torch:on}]});
this.classList.toggle('active',on);
}
}catch(e){showToast('Flashlight not available','error')}
});

// Flip camera
document.getElementById('flipBtn').addEventListener('click',async function(){
await initCamera();
});

// Status
function updateStatus(type,text){
statusBadge.className='status-badge '+(type==='active'?'active':'scanning');
statusText.textContent=text;
}

// ===== CROP SCANNING =====
function analyzeImage(canvas){
var ctx2=canvas.getContext('2d');
var w=canvas.width,h=canvas.height;
var imageData=ctx2.getImageData(0,0,w,h);
var data=imageData.data;

// Sample center region (where crop should be)
var samples=[];
var cx=Math.floor(w/2),cy=Math.floor(h/2);
var rw=Math.floor(w*0.3),rh=Math.floor(h*0.3);
for(var y=cy-rh;y<cy+rh;y+=10){
for(var x=cx-rw;x<cx+rw;x+=10){
if(x>=0&&x<w&&y>=0&&y<h){
var i=(y*w+x)*4;
samples.push({r:data[i],g:data[i+1],b:data[i+2]});
}
}
}

if(samples.length===0)return null;

// Calculate average color
var avgR=0,avgG=0,avgB=0;
samples.forEach(function(s){avgR+=s.r;avgG+=s.g;avgB+=s.b});
avgR=Math.floor(avgR/samples.length);
avgG=Math.floor(avgG/samples.length);
avgB=Math.floor(avgB/samples.length);

// Find matching crop by color
var bestMatch=null,bestScore=-1;
CROP_PROFILES.forEach(function(profile){
var c=profile.color;
var score=0;
if(avgR>=c.r[0]&&avgR<=c.r[1])score+=30;
if(avgG>=c.g[0]&&avgG<=c.g[1])score+=30;
if(avgB>=c.b[0]&&avgB<=c.b[1])score+=30;
// Brightness check
var brightness=(avgR+avgG+avgB)/3;
if(brightness>30&&brightness<250)score+=10;
if(score>bestScore){bestScore=score;bestMatch=profile}
});

return bestMatch?{crop:bestMatch,confidence:Math.min(bestScore,95),avgColor:{r:avgR,g:avgG,b:avgB}}:null;
}

function getPrice(cropKey,market){
var data=ROOT_CROP_PRICES[market||'metro-manila'];
if(!data)return null;
return data.crops.find(function(c){return c.localName.toLowerCase()===cropKey||c.name.toLowerCase().includes(cropKey)});
}

// Scan button
scanBtn.addEventListener('click',async function(){
if(state.isScanning)return;
state.isScanning=true;
updateStatus('scanning','Analyzing...');

// Flash effect
var flash=document.getElementById('flash');
flash.classList.add('active');
setTimeout(function(){flash.classList.remove('active')},100);

// Capture frame
var frame=document.createElement('canvas');
frame.width=video.videoWidth;
frame.height=video.videoHeight;
var fctx=frame.getContext('2d');
fctx.drawImage(video,0,0);

// Analyze
var analysis=analyzeImage(frame);

if(!analysis||analysis.confidence<40){
errorSound();
showResults([{
type:'unknown',
title:'Crop Not Identified',
subtitle:'Could not recognize this as a root crop',
icon:'❓',
message:'Tips for better scanning:\n• Place one crop at a time\n• Use plain background\n• Ensure good lighting\n• Fill the frame with the crop',
actions:[{label:'Try Again',primary:true,fn:function(){closeResults();showToast('Position crop and tap scan')}},{label:'View Prices',fn:function(){showPriceList()}}]
}]);
state.isScanning=false;
updateStatus('active','Ready to Scan');
return;
}

// Get price
var crop=analysis.crop;
var priceData=getPrice(crop.key,state.currentMarket);

if(!priceData){
errorSound();
showResults([{
type:'error',
title:'Price Not Available',
subtitle:crop.names[0],
icon:crop.icon,
message:'Could not find price data for this crop.',
actions:[{label:'View All Prices',primary:true,fn:function(){showPriceList()}}]
}]);
state.isScanning=false;
updateStatus('active','Ready to Scan');
return;
}

// Success!
successSound();
if(navigator.vibrate)navigator.vibrate([50,100,50]);

var trendIcon=priceData.trend==='up'?'↑':priceData.trend==='down'?'↓':'→';
var trendClass=priceData.trend==='up'?'up':priceData.trend==='down'?'down':'stable';
var trendColor=priceData.trend==='up'?'var(--danger)':priceData.trend==='down'?'var(--success)':'var(--text-muted)';

showResults([{
type:'crop',
title:priceData.name,
subtitle:priceData.localName+' | '+crop.desc,
icon:crop.icon,
confidence:analysis.confidence+'% match',
price:priceData.price,
unit:priceData.unit,
low:priceData.low,
high:priceData.high,
trend:trendIcon,
trendClass:trendClass,
trendColor:trendColor,
change:priceData.change,
market:ROOT_CROP_PRICES[state.currentMarket].source,
actions:[
{label:'Share Price',primary:true,fn:function(){sharePrice(priceData)}},
{label:'View All',fn:function(){showPriceList()}},
{label:'Copy',fn:function(){copyPrice(priceData)}}
]
}]);

// Save to history
saveToHistory({crop:priceData.name,local:priceData.localName,price:priceData.price,market:state.currentMarket,date:new Date().toISOString()});

state.isScanning=false;
updateStatus('active','Ready to Scan');
});

function showResults(results){
resultsContent.innerHTML=results.map(function(r,i){
if(r.type==='crop'){
return'<div class="crop-result" style="animation-delay:'+(i*.1)+'s">'+
'<div class="crop-identified">'+
'<div class="crop-icon">'+r.icon+'</div>'+
'<div class="crop-name">'+
'<h3>'+r.title+'</h3>'+
'<p>'+r.subtitle+'</p>'+
'</div>'+
'<span class="crop-confidence">'+r.confidence+'</span>'+
'</div>'+
'<div class="price-card">'+
'<div class="price-header">'+
'<span class="price-label">Current Price</span>'+
'<span class="price-value">PHP '+r.price.toFixed(2)+'<span class="price-unit">/'+r.unit+'</span></span>'+
'</div>'+
'<div class="price-details">'+
'<div class="price-detail"><div class="price-detail-label">Lowest</div><div class="price-detail-value">PHP '+r.low.toFixed(2)+'</div></div>'+
'<div class="price-detail"><div class="price-detail-label">Highest</div><div class="price-detail-value">PHP '+r.high.toFixed(2)+'</div></div>'+
'</div>'+
'<div class="price-trend '+r.trendClass+'">'+
'<i class="fas fa-'+(r.trendClass==='up'?'arrow-up':r.trendClass==='down'?'arrow-down':'minus')+'"></i> '+
(r.change>0?'+':'')+r.change.toFixed(2)+' PHP vs yesterday'+
'</div>'+
'<div class="market-info"><i class="fas fa-map-marker-alt"></i> '+r.market+'</div>'+
'</div>'+
'<div class="action-row">'+
r.actions.map(function(a,idx){
return'<button class="action-btn '+(idx===0?'primary':'secondary')+'" onclick="('+a.fn.toString()+')()">'+(a.icon?'<i class="fas fa-'+a.icon+'"></i> ':'')+a.label+'</button>';
}).join('')+
'</div>'+
'</div>';
}else{
return'<div class="crop-result" style="animation-delay:'+(i*.1)+'s">'+
'<div class="crop-identified">'+
'<div class="crop-icon" style="font-size:2rem">'+r.icon+'</div>'+
'<div class="crop-name">'+
'<h3>'+r.title+'</h3>'+
'<p>'+r.subtitle+'</p>'+
'</div>'+
'</div>'+
'<div style="background:var(--darker);padding:12px;border-radius:8px;margin:10px 0;font-size:.85rem;color:var(--text-muted);white-space:pre-line">'+r.message+'</div>'+
'<div class="action-row">'+
r.actions.map(function(a,idx){
return'<button class="action-btn '+(idx===0?'primary':'secondary')+'" onclick="('+a.fn.toString()+')()">'+a.label+'</button>';
}).join('')+
'</div>'+
'</div>';
}
}).join('');
resultsPanel.classList.add('open');
}

function closeResults(){resultsPanel.classList.remove('open')}
document.getElementById('closePanel').addEventListener('click',closeResults);

// ===== HISTORY =====
function saveToHistory(entry){
state.scanHistory.unshift(entry);
if(state.scanHistory.length>50)state.scanHistory.pop();
localStorage.setItem('rootcropHistory',JSON.stringify(state.scanHistory));
}

function showHistory(){
if(state.scanHistory.length===0){
showResults([{
type:'unknown',
title:'No Scan History',
subtitle:'Start scanning root crops',
icon:'📋',
message:'Your scan history will appear here.\n\nScan root crops to see their market prices.',
actions:[{label:'Start Scanning',primary:true,fn:function(){closeResults();}}]
}]);
return;
}

var historyHtml=state.scanHistory.slice(0,20).map(function(h,i){
var d=new Date(h.date);
var time=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
var date=d.toLocaleDateString();
return'<div class="crop-price-card" style="animation-delay:'+(i*.05)+'s">'+
'<div class="crop-price-header">'+
'<div>'+
'<div class="crop-price-name">'+h.crop+'</div>'+
'<div class="crop-price-local">'+h.local+' | '+h.market+'</div>'+
'</div>'+
'<div style="text-align:right">'+
'<div class="crop-price-amount">PHP '+h.price.toFixed(2)+'</div>'+
'<div class="crop-price-local">'+time+' '+date+'</div>'+
'</div>'+
'</div>'+
'</div>';
}).join('');

showResults([{
type:'crop',
title:'Scan History',
subtitle:state.scanHistory.length+' scans saved',
icon:'📋',
confidence:'',
price:0,
unit:'',
low:0,high:0,trend:'',trendClass:'stable',trendColor:'',change:0,market:'',
actions:[{label:'Clear History',primary:false,fn:function(){localStorage.removeItem('rootcropHistory');state.scanHistory=[];showToast('History cleared','success');closeResults();}}]
}]);

// Replace the result content with history list
resultsContent.innerHTML='<div style="max-height:50vh;overflow-y:auto;padding-right:8px">'+historyHtml+'</div>';
}

// ===== UTILITIES =====
function sharePrice(priceData){
var text=priceData.localName+' - PHP '+priceData.price.toFixed(2)+'/'+priceData.unit+' today at '+ROOT_CROP_PRICES[state.currentMarket].source;
if(navigator.share){navigator.share({title:'RootCrop Price',text:text}).catch(function(){})}
else{copyToClipboard(text)}
}

function copyPrice(priceData){
copyToClipboard(priceData.name+' ('+priceData.localName+')\nPrice: PHP '+priceData.price.toFixed(2)+'/'+priceData.unit+'\nMarket: '+ROOT_CROP_PRICES[state.currentMarket].source);
}

function copyToClipboard(text){
try{navigator.clipboard.writeText(text).then(function(){showToast('Copied!','success')})}catch(e){
var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied!','success');
}}

initCamera();
</script>
